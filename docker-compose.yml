version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: agriflow-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=AgriFlow2024!
      - MSSQL_PID=Developer
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - agriflow-network

  redis:
    image: redis:7-alpine
    container_name: agriflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agriflow-network

volumes:
  sqlserver-data:
  redis-data:

networks:
  agriflow-network:
    driver: bridge
